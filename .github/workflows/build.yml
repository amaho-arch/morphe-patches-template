name: Build Patches

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build patches
        run: ./gradlew :patches:buildAndroid --no-daemon

      - name: Upload mpp artifact
        uses: actions/upload-artifact@v4
        with:
          name: patches-mpp
          path: patches/build/libs/patches-*.mpp